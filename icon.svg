<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1830"/>
      <stop offset="100%" stop-color="#12111f"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6df5"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c6df5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c6df5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>

  <!-- Chart area fill -->
  <path d="M28 130 L28 108 L60 88 L92 100 L124 58 L156 32 L156 130 Z"
        fill="url(#fill)"/>

  <!-- Chart line -->
  <polyline points="28,108 60,88 92,100 124,58 156,32"
            fill="none"
            stroke="url(#line)"
            stroke-width="8"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Dot at top right -->
  <circle cx="156" cy="32" r="7" fill="#a78bfa"/>

  <!-- Bar chart at bottom left (accent) -->
  <rect x="28" y="118" width="12" height="12" rx="3" fill="#7c6df5" opacity="0.5"/>
  <rect x="46" y="112" width="12" height="18" rx="3" fill="#7c6df5" opacity="0.5"/>
</svg>
