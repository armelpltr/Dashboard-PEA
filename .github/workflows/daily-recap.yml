name: Daily Market Recap

on:
  schedule:
    # 20h00 heure Paris = 18h00 UTC (heure d'été) / 19h00 UTC (heure d'hiver)
    # On lance à 18h00 UTC (≈20h l'été, 19h l'hiver)
    - cron: '0 18 * * 1-5'  # Lundi-Vendredi uniquement
  workflow_dispatch:
    inputs:
      target_uid:
        description: 'UID Firebase spécifique (vide = tous les users)'
        required: false
        default: ''

jobs:
  send-recap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Run daily recap
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TARGET_UID: ${{ github.event.inputs.target_uid }}
        run: |
          cd scripts
          node daily-recap.js
