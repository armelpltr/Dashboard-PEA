name: Daily Market Recap

on:
  schedule:
    # 18h00 heure Paris = 16h00 UTC (heure d'été) / 17h00 UTC (heure d'hiver)
    # On lance à 16h00 UTC pour couvrir les deux cas
    - cron: '0 16 * * 1-5'  # Lundi-Vendredi uniquement
  workflow_dispatch:  # Permet de lancer manuellement pour tester

jobs:
  send-recap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Run daily recap
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          cd scripts
          node daily-recap.js
