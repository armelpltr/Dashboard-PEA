name: Mise à jour dividendes

on:
  schedule:
    - cron: '0 6 * * 1'  # Tous les lundis à 6h UTC
  workflow_dispatch:

jobs:
  update-dividends:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch dividendes via FMP
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python3 << 'EOF'
          import os, json, requests, datetime

          api_key = os.environ.get("FMP_API_KEY", "").strip()
          if not api_key:
            print("❌ FMP_API_KEY manquant — arrêt sans modifier le fichier")
            raise SystemExit(1)

          today = datetime.date.today().isoformat()
          in_1y = (datetime.date.today() + datetime.timedelta(days=365)).isoformat()

          TICKERS = [
            {"ticker": "AI.PA",   "name": "Air Liquide"},
            {"ticker": "TTE.PA",  "name": "TotalEnergies"},
            {"ticker": "BNP.PA",  "name": "BNP Paribas"},
            {"ticker": "ACA.PA",  "name": "Crédit Agricole"},
            {"ticker": "SAN.PA",  "name": "Sanofi"},
            {"ticker": "OR.PA",   "name": "L'Oréal"},
            {"ticker": "MC.PA",   "name": "LVMH"},
            {"ticker": "ENGI.PA", "name": "Engie"},
            {"ticker": "DG.PA",   "name": "Vinci"},
            {"ticker": "SU.PA",   "name": "Schneider Electric"},
            {"ticker": "RI.PA",   "name": "Pernod Ricard"},
            {"ticker": "CAP.PA",  "name": "Capgemini"},
            {"ticker": "KER.PA",  "name": "Kering"},
            {"ticker": "SAF.PA",  "name": "Safran"},
            {"ticker": "CS.PA",   "name": "AXA"},
          ]

          # Lire JSON existant pour préserver les entrées confirmées
          existing = {}
          try:
            with open("data/dividendes.json", "r", encoding="utf-8") as f:
              existing = json.load(f).get("dividends", {})
          except Exception:
            pass

          # Fetch calendrier dividendes 12 mois
          print("Fetching dividend calendar from FMP...")
          calendar = {}
          try:
            url = f"https://financialmodelingprep.com/api/v3/stock_dividend_calendar?from={today}&to={in_1y}&apikey={api_key}"
            r = requests.get(url, timeout=30)
            r.raise_for_status()
            for entry in r.json():
              sym = entry.get("symbol", "")
              if sym not in calendar:
                calendar[sym] = entry
            print(f"  ✓ {len(calendar)} tickers dans le calendrier")
          except Exception as e:
            print(f"  ✗ Erreur calendrier: {e}")
            raise SystemExit(1)

          results = {}
          for stock in TICKERS:
            ticker = stock["ticker"]
            name   = stock["name"]
            prev   = existing.get(ticker, {})
            prev_next = prev.get("next")

            # Préserver next confirmé avec date passée (Yahoo pas encore indexé)
            if prev_next and prev_next.get("confirmed") and prev_next.get("date", "") <= today:
              next_div = prev_next
              print(f"  ↩ {ticker}: next confirmé passé préservé ({prev_next['date']})")
            elif ticker in calendar:
              e = calendar[ticker]
              pay_date = e.get("paymentDate") or e.get("date") or e.get("declarationDate")
              amount   = e.get("dividend") or e.get("adjDividend")
              if pay_date and amount:
                next_div = {
                  "date":             pay_date,
                  "amount_estimated": round(float(amount), 4),
                  "confirmed":        bool(e.get("paymentDate")),
                }
                print(f"  ✓ {ticker}: prochain {pay_date} — {amount}")
              else:
                next_div = None
                print(f"  – {ticker}: dans calendrier mais données incomplètes")
            else:
              next_div = None
              print(f"  – {ticker}: absent du calendrier FMP")

            results[ticker] = {"ticker": ticker, "name": name, "next": next_div}

          output = {"generated_at": today, "dividends": results}
          os.makedirs("data", exist_ok=True)
          with open("data/dividendes.json", "w", encoding="utf-8") as f:
            json.dump(output, f, ensure_ascii=False, indent=2)
          print(f"\n✅ dividendes.json généré avec {len(results)} actions")
          EOF

      - name: Commit et push le fichier JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dividendes.json
          git diff --staged --quiet || git commit -m "chore: mise à jour dividendes $(date +'%Y-%m-%d')"
          git push
