name: Mise à jour dividendes

on:
  schedule:
    - cron: '0 6 * * 1'  # Tous les lundis à 6h UTC
  workflow_dispatch:       # Déclenchement manuel possible

jobs:
  update-dividends:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Appel Mistral pour les dividendes
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python3 << 'EOF'
          import os, json, requests, datetime

          api_key = os.environ["MISTRAL_API_KEY"]
          today   = datetime.date.today().isoformat()

          # Liste des tickers à suivre (actions françaises courantes sur PEA)
          # Tu peux en ajouter selon ton portefeuille
          TICKERS = [
            {"ticker": "AI.PA",   "name": "Air Liquide"},
            {"ticker": "TTE.PA",  "name": "TotalEnergies"},
            {"ticker": "BNP.PA",  "name": "BNP Paribas"},
            {"ticker": "ACA.PA",  "name": "Crédit Agricole"},
            {"ticker": "SAN.PA",  "name": "Sanofi"},
            {"ticker": "OR.PA",   "name": "L'Oréal"},
            {"ticker": "MC.PA",   "name": "LVMH"},
            {"ticker": "ENGI.PA", "name": "Engie"},
            {"ticker": "DG.PA",   "name": "Vinci"},
            {"ticker": "SU.PA",   "name": "Schneider Electric"},
            {"ticker": "RI.PA",   "name": "Pernod Ricard"},
            {"ticker": "CAP.PA",  "name": "Capgemini"},
            {"ticker": "KER.PA",  "name": "Kering"},
            {"ticker": "SAF.PA",  "name": "Safran"},
            {"ticker": "CS.PA",   "name": "AXA"},
          ]

          results = {}

          for stock in TICKERS:
            ticker = stock["ticker"]
            name   = stock["name"]
            print(f"Fetching dividends for {name} ({ticker})...")

            prompt = f"""Tu es un assistant financier expert des marchés français.
          Donne-moi l'historique complet des dividendes versés par {name} (ticker: {ticker}) sur les 5 dernières années, ainsi que le prochain dividende prévu si connu.

          Réponds UNIQUEMENT avec un objet JSON valide, sans texte avant ou après, au format exactement suivant:
          {{
            "ticker": "{ticker}",
            "name": "{name}",
            "history": [
              {{"date": "YYYY-MM-DD", "amount": 0.00, "label": "Dividende AAAA"}},
              ...
            ],
            "next": {{
              "date": "YYYY-MM-DD",
              "amount_estimated": 0.00,
              "confirmed": false
            }}
          }}

          Les dates doivent être les dates de versement (paiement) réelles, pas les dates de détachement.
          Trie l'historique du plus récent au plus ancien.
          Si le prochain dividende n'est pas connu, mets next à null.
          Aujourd'hui nous sommes le {today}."""

            try:
              response = requests.post(
                "https://api.mistral.ai/v1/chat/completions",
                headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
                },
                json={
                  "model": "mistral-small-latest",
                  "messages": [{"role": "user", "content": prompt}],
                  "temperature": 0.1,
                  "max_tokens": 1000,
                },
                timeout=30
              )
              response.raise_for_status()
              content = response.json()["choices"][0]["message"]["content"].strip()
              # Nettoyer les éventuels backticks markdown
              if content.startswith("```"):
                content = content.split("```")[1]
                if content.startswith("json"):
                  content = content[4:]
              data = json.loads(content.strip())
              results[ticker] = data
              print(f"  ✓ {len(data.get('history', []))} dividendes trouvés")
            except Exception as e:
              print(f"  ✗ Erreur pour {ticker}: {e}")
              results[ticker] = {"ticker": ticker, "name": name, "history": [], "next": None, "error": str(e)}

          # Écrire le fichier JSON final
          output = {
            "generated_at": today,
            "dividends": results
          }

          os.makedirs("data", exist_ok=True)
          with open("data/dividendes.json", "w", encoding="utf-8") as f:
            json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"\n✅ dividendes.json généré avec {len(results)} actions")
          EOF

      - name: Commit et push le fichier JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dividendes.json
          git diff --staged --quiet || git commit -m "chore: mise à jour dividendes $(date +'%Y-%m-%d')"
          git push
