name: Deploy Worker

# Déploie le Cloudflare Worker automatiquement à chaque push touchant
# capital-board-worker/ (plus besoin de `wrangler deploy` manuel).
on:
  push:
    branches: [main]
    paths:
      - 'capital-board-worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: capital-board-worker
