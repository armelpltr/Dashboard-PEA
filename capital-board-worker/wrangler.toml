name = "capital-board-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGIN = "https://capitalboard.fr"
FIREBASE_PROJECT_ID = "dashboard-pea"
FIREBASE_WEB_API_KEY = "AIzaSyDvZ_0loJ9Lf_jhz-ZDGsydG9AE21CU5Uc"
ADMIN_UID = "A6nZQ8PcxdURytSesA17xK81I9T2"

# Cache du calendrier earnings (snapshot Finnhub rafraîchi 1×/jour).
# Créer le namespace puis coller l'id ci-dessous :
#   wrangler kv namespace create EARNINGS
[[kv_namespaces]]
binding = "EARNINGS"
id = "8d4037e71b1244b29d70174b71527026"

# Cron Trigger : rafraîchit le snapshot earnings chaque jour à 06:00 UTC.
[triggers]
crons = ["0 6 * * *"]

# Secrets à injecter via : wrangler secret put <NOM>
#   FIREBASE_SERVICE_ACCOUNT   → JSON complet du service account Firebase
#   RESEND_API_KEY             → clé API Resend
#   FINNHUB_API_KEY            → clé API Finnhub (calendrier earnings)
